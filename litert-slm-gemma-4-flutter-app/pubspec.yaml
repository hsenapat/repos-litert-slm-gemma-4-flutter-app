name: litert_slm_gemma4
description: On-device Gemma 4 chat app using LiteRT-LM inference.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_gemma: ^1.1.2
  flutter_gemma_litertlm: ^1.0.2
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_gemma_embeddings: ^1.0.1
  flutter_gemma_rag_sqlite: ^1.1.0
  shared_preferences: ^2.3.0
  crypto: ^3.0.3
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/manuals/manuals_rag.db
    - assets/manuals/rag_vector.db
