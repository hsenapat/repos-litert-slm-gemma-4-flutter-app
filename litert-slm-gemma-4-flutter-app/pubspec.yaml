name: litert_slm_gemma4
description: On-device Gemma 4 chat app using LiteRT-LM inference.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_gemma: ^1.1.2
  flutter_gemma_litertlm: ^1.0.2
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_gemma_embeddings: ^1.0.1
  flutter_gemma_rag_sqlite: ^1.1.0
  shared_preferences: ^2.3.0
  crypto: ^3.0.3
  http: ^1.6.0
  whisper_kit: ^0.3.1
  record: ^7.1.1
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    image_path: "assets/images/logo.png"
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/manuals/manuals_rag.db
    - assets/manuals/rag_vector.db
    - assets/images/logo.png
    - assets/test/hello_test.wav
